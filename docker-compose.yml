version: '3.8'

x-superset-image: &superset-image apache/superset:latest-dev
x-superset-depends-on: &superset-depends-on
  superset-config-writer:
    condition: service_completed_successfully
  db:
    condition: service_started
  redis:
    condition: service_started
    
x-superset-volumes: &superset-volumes
  - superset_config_vol:/app/pythonpath
x-superset-environment: &superset-environment
  SUPERSET_SECRET_KEY: "TU_SECRET_KEY_PRODUCCION_CAMBIAR_ESTO_12345"
  SUPERSET_CONFIG_PATH: "/app/pythonpath/superset_config.py"

services:
  superset-config-writer:
    image: alpine:latest
    container_name: superset_config_writer
    volumes: *superset-volumes
    command: >
      sh -c 'cat << "EOF" > /app/pythonpath/superset_config.py
      import os
      from celery.schedules import crontab
      SECRET_KEY = os.getenv("SUPERSET_SECRET_KEY", "TU_SECRET_KEY_PRODUCCION_CAMBIAR_ESTO_12345")
      SQLALCHEMY_DATABASE_URI = "postgresql+psycopg2://superset:superset_password@db:5432/superset"
      class CeleryConfig:
          broker_url = "redis://redis:6379/0"
          imports = ("superset.sql_lab",)
          result_backend = "redis://redis:6379/0"
          worker_prefetch_multiplier = 1
          task_acks_late = False
          beat_schedule = {
              "reports.scheduler": {"task": "reports.scheduler", "schedule": crontab(minute="*", hour="*")},
              "reports.prune_log": {"task": "reports.prune_log", "schedule": crontab(minute=10, hour=0)},
          }
      CELERY_CONFIG = CeleryConfig
      DATA_CACHE_CONFIG = {"CACHE_TYPE": "RedisCache", "CACHE_DEFAULT_TIMEOUT": 86400, "CACHE_KEY_PREFIX": "sup_", "CACHE_REDIS_URL": "redis://redis:6379/1"}
      FILTER_STATE_CACHE_CONFIG = {"CACHE_TYPE": "RedisCache", "CACHE_DEFAULT_TIMEOUT": 86400, "CACHE_KEY_PREFIX": "sup_filter_", "CACHE_REDIS_URL": "redis://redis:6379/2"}
      EXPLORE_FORM_DATA_CACHE_CONFIG = {"CACHE_TYPE": "RedisCache", "CACHE_DEFAULT_TIMEOUT": 86400, "CACHE_KEY_PREFIX": "sup_explore_", "CACHE_REDIS_URL": "redis://redis:6379/3"}
      FEATURE_FLAGS = {"DASHBOARD_CROSS_FILTERS": True, "ENABLE_TEMPLATE_PROCESSING": True, "DRILL_TO_DETAIL": True, "HORIZONTAL_FILTER_BAR": True}
      SQLLAB_TIMEOUT = 300
      SUPERSET_WEBSERVER_TIMEOUT = 300
      EOF
      chmod 666 /app/pythonpath/superset_config.py'

  redis:
    image: redis:7
    container_name: superset_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  db:
    image: postgres:18
    container_name: superset_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset_password
      POSTGRES_DB: superset
    volumes:
      - db_data:/var/lib/postgresql/data

  superset:
    image: *superset-image
    container_name: superset_app
    restart: unless-stopped
    ports:
      - "8088:8088"
    depends_on: *superset-depends-on
    volumes: *superset-volumes
    environment:
      <<: *superset-environment
      SUPERSET_LOAD_EXAMPLES: 0

  superset-init:
    image: *superset-image
    container_name: superset_init
    command: >
      /bin/sh -c "
      sleep 15 &&
      superset fab create-admin --username admin --firstname Superset --lastname Admin --email admin@superset.com --password admin &&
      superset db upgrade &&
      superset init
      "
    depends_on: *superset-depends-on
    volumes: *superset-volumes
    environment:
      <<: *superset-environment

  superset-worker:
    image: *superset-image
    container_name: superset_worker
    command: ["celery", "--app=superset.tasks.celery_app:app", "worker", "-O", "fair", "-l", "INFO"]
    restart: unless-stopped
    depends_on: *superset-depends-on
    volumes: *superset-volumes
    environment:
      <<: *superset-environment

  superset-worker-beat:
    image: *superset-image
    container_name: superset_worker_beat
    command: ["celery", "--app=superset.tasks.celery_app:app", "beat"]
    restart: unless-stopped
    depends_on: *superset-depends-on
    volumes: *superset-volumes
    environment:
      <<: *superset-environment

volumes:
  redis_data:
  db_data:
  superset_config_vol:
